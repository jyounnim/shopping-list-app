<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .stats {
      font-size: 0.82rem;
      color: #666;
      margin-bottom: 24px;
    }

    .stats span { color: #aaa; }

    /* Input area */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .input-row input {
      flex: 1;
      padding: 11px 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #e8e8e8;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-row input::placeholder { color: #444; }
    .input-row input:focus { border-color: #4a9eff; }

    .btn-add {
      padding: 11px 18px;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover { background: #3a8eef; }
    .btn-add:active { transform: scale(0.97); }

    /* List */
    .section-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 10px;
    }

    .list { list-style: none; }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #161616;
      border: 1px solid #222;
      border-radius: 10px;
      margin-bottom: 7px;
      transition: opacity 0.2s, border-color 0.2s;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.checked {
      opacity: 0.45;
      border-color: #1a1a1a;
    }

    /* Custom checkbox */
    .checkbox {
      width: 20px;
      height: 20px;
      min-width: 20px;
      border-radius: 50%;
      border: 2px solid #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .item.checked .checkbox {
      background: #4a9eff;
      border-color: #4a9eff;
    }

    .checkbox::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid transparent;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
      transition: border-color 0.15s;
    }

    .item.checked .checkbox::after { border-color: #fff; }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.3;
      transition: text-decoration 0.15s;
      cursor: pointer;
      word-break: break-word;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #666;
    }

    .btn-delete {
      width: 28px;
      height: 28px;
      min-width: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: #3a3a3a;
      font-size: 1.1rem;
      cursor: pointer;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .btn-delete:hover { color: #e05252; background: rgba(224,82,82,0.1); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px 0;
      color: #333;
      font-size: 0.9rem;
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* Clear done button */
    .footer {
      margin-top: 20px;
      text-align: right;
    }

    .btn-clear {
      background: none;
      border: none;
      color: #444;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .btn-clear:hover { color: #e05252; background: rgba(224,82,82,0.08); }
    .btn-clear:disabled { opacity: 0.3; cursor: default; }
    .btn-clear:disabled:hover { color: #444; background: none; }

    .loading {
      text-align: center;
      padding: 40px 0;
      color: #555;
      font-size: 0.88rem;
    }

    .btn-add:disabled { background: #2a4a7f; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="app">
  <h1>🛒 쇼핑리스트</h1>
  <p class="stats" id="stats"></p>

  <div class="input-row">
    <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="100" autocomplete="off">
    <button class="btn-add" onclick="addItem()">추가</button>
  </div>

  <div id="activeSection">
    <div class="section-title" id="activeTitle"></div>
    <ul class="list" id="activeList"></ul>
  </div>

  <div id="checkedSection">
    <div class="section-title" id="checkedTitle"></div>
    <ul class="list" id="checkedList"></ul>
  </div>

  <div class="footer">
    <button class="btn-clear" id="clearBtn" onclick="clearChecked()">완료 항목 삭제</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://peocrilksvtrghvanqnt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlb2NyaWxrc3Z0cmdodmFucW50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMjUxMzksImV4cCI6MjA5MDYwMTEzOX0.ZN9N-orOO6LWAF0dgitV4tsQ7zXh8IcbdLgeK4v3-_E';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let items = [];

  async function loadItems() {
    const { data, error } = await db
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) { console.error('로드 오류:', error); return; }
    items = data;
    render();
  }

  async function addItem() {
    const input = document.getElementById('itemInput');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }

    setLoading(true);
    const { error } = await db.from('shopping_items').insert({ text, checked: false });
    if (error) { console.error('추가 오류:', error); setLoading(false); return; }
    input.value = '';
    input.focus();
    await loadItems();
    setLoading(false);
  }

  async function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const { error } = await db
      .from('shopping_items')
      .update({ checked: !item.checked })
      .eq('id', id);
    if (error) { console.error('수정 오류:', error); return; }
    await loadItems();
  }

  async function deleteItem(id) {
    const { error } = await db.from('shopping_items').delete().eq('id', id);
    if (error) { console.error('삭제 오류:', error); return; }
    await loadItems();
  }

  async function clearChecked() {
    const { error } = await db.from('shopping_items').delete().eq('checked', true);
    if (error) { console.error('삭제 오류:', error); return; }
    await loadItems();
  }

  function setLoading(on) {
    document.querySelector('.btn-add').disabled = on;
  }

  function makeItem(item) {
    const li = document.createElement('li');
    li.className = 'item' + (item.checked ? ' checked' : '');
    li.innerHTML = `
      <div class="checkbox" onclick="toggleItem(${item.id})"></div>
      <span class="item-text" onclick="toggleItem(${item.id})">${escHtml(item.text)}</span>
      <button class="btn-delete" onclick="deleteItem(${item.id})" title="삭제">✕</button>
    `;
    return li;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const active  = items.filter(i => !i.checked);
    const checked = items.filter(i =>  i.checked);

    const aList = document.getElementById('activeList');
    const cList = document.getElementById('checkedList');
    aList.innerHTML = '';
    cList.innerHTML = '';

    // Stats
    document.getElementById('stats').innerHTML =
      items.length === 0
        ? '리스트가 비어 있습니다'
        : `<span>${items.length}개</span> 중 <span>${checked.length}개</span> 완료`;

    // Active items
    document.getElementById('activeTitle').textContent = active.length ? `남은 항목 (${active.length})` : '';
    if (active.length === 0 && checked.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.innerHTML = '<div class="empty-icon">🛍️</div>아이템을 추가해 보세요';
      aList.appendChild(empty);
    } else {
      active.forEach(i => aList.appendChild(makeItem(i)));
    }

    // Checked items
    document.getElementById('checkedTitle').textContent = checked.length ? `완료 (${checked.length})` : '';
    checked.forEach(i => cList.appendChild(makeItem(i)));

    document.getElementById('clearBtn').disabled = checked.length === 0;
  }

  // Enter key support
  document.getElementById('itemInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  // Show loading state then fetch from Supabase
  document.getElementById('stats').textContent = '불러오는 중...';
  loadItems();
</script>
</body>
</html>
